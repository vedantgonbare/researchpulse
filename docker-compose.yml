services:

  db:
    image: postgres:15
    container_name: researchpulse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: researchpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: researchpulse_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: researchpulse_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/researchpulse
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: